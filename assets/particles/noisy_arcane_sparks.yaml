name: "noisy_arcane_sparks"
description: "Arcane sparks with continuous scale, alpha, and rotation noise for unstable magical flicker."

image:
  image_from: "ef1"
  image_id: 16

emitter:
  x: 0
  y: 0
  shape:
    type: "circle"
    radius:
      min: 0
      max: 28

animation:
  duration:
    value: 1.2
    range:
      min: 0.9
      max: 1.5
  position:
    type: "polar"
    angle:
      min: 0
      max: 6.2831855
    distance:
      min: 30
      max: 110
    turbulence:
      strength:
        min: 4
        max: 12
      scale: 80
      octaves: 2
      persistence: 0.5
      time_scale: 0.7
      space: "local"
      domain_motion:
        orbit_radius_x: 12
        orbit_radius_y: 12
        orbit_frequency: 0.6
      envelope:
        start: 0.2
        end: 1.0
        easing: "OutSine"
    easing: "OutQuad"
  alpha:
    start: 0.85
    end: 0.1
    easing: "Linear"
    noise:
      amplitude: 0.18
      frequency: 1.4
      octaves: 2
      seed: 2.1
  scale:
    start: 0.45
    end: 0.12
    easing: "OutQuad"
    noise:
      amplitude: 0.12
      frequency: 1.1
      octaves: 2
      seed: 4.7
  rotation:
    start: 0.0
    end: 0.6
    easing: "Linear"
    noise:
      amplitude: 0.7
      frequency: 0.9
      octaves: 2
      seed: 1.3
  color:
    start_r: 0.6
    start_g: 0.95
    start_b: 1.0
    end_r: 1.0
    end_g: 0.35
    end_b: 1.0
    easing: "Linear"

spawn:
  interval: 2
  particles_per_spawn: 10
  max_particles: 180
  is_loop: true
