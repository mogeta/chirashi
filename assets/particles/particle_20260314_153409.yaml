name: particle_20260314_153409
description: |
    Rocket exhaust sparks that trail behind the launch point and curve toward a target (e.g. an enemy). Each spark arcs through a random control offset, giving the impression of swirling exhaust converging on the destination. Set AttractorX/Y on the entity to the rocket's current target position.
image:
    image_from: ""
    image_id: 0
emitter:
    x: 0
    "y": 0
    shape:
        type: point
        radius:
            min: 0
            max: 100
        end_angle: 6.2831855
        width: 25
        height: 25
        length: 200
animation:
    duration:
        value: 1.5
    position:
        type: attractor
        control_x:
            min: -60
            max: 90
        control_y:
            min: -60
            max: 80
        easing: OutQuad
    alpha:
        start: 0.9
        end: 0
        easing: outCubic
    scale:
        start: 1.4
        end: 0.1
        easing: inQuad
    rotation:
        start: 0
        end: 3.14159
        easing: linear
    color:
        start_r: 1
        start_g: 0.8
        start_b: 0.65
        end_r: 0.8
        end_g: 0.75
        end_b: 0.9
        easing: outQuad
spawn:
    interval: 10
    particles_per_spawn: 12
    max_particles: 6080
    is_loop: false
