name: "healing_aura"
description: "Soft upward sparkles for healing circles, buff zones, and shrines."

image:
  image_from: "ef1"
  image_id: 5

emitter:
  x: 0
  y: 0
  shape:
    type: "circle"
    radius:
      min: 0
      max: 48
    start_angle: 0
    end_angle: 6.2831855

animation:
  duration:
    value: 1.1
    range:
      min: 0.8
      max: 1.5

  position:
    type: "cartesian"
    end_x:
      min: -20
      max: 20
    end_y:
      min: -120
      max: -60
    easing: "OutSine"

  alpha:
    start: 0.0
    end: 0.0
    type: "sequence"
    steps:
      - from: 0.0
        to: 0.85
        duration: 0.25
        easing: "OutQuad"
      - from: 0.85
        to: 0.0
        duration: 0.85
        easing: "InQuad"

  scale:
    start: 0.3
    end: 0.7
    easing: "OutSine"

  rotation:
    start: 0.0
    end: 1.6
    easing: "Linear"

  color:
    start_r: 0.55
    start_g: 1.0
    start_b: 0.75
    end_r: 0.2
    end_g: 0.85
    end_b: 0.55
    easing: "Linear"

spawn:
  interval: 3
  particles_per_spawn: 8
  max_particles: 320
  is_loop: true
