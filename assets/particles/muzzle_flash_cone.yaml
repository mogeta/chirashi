name: "muzzle_flash_cone"
description: "Short forward cone burst for guns, turrets, and cannons."

image:
  image_from: "ef1"
  image_id: 16

emitter:
  x: 0
  y: 0
  shape:
    type: "line"
    length: 18
    rotation: 0

animation:
  duration:
    value: 0.14
    range:
      min: 0.08
      max: 0.18

  position:
    type: "polar"
    angle:
      min: -0.35
      max: 0.35
    distance:
      min: 24
      max: 90
    easing: "OutQuad"

  alpha:
    start: 1.0
    end: 0.0
    easing: "InQuad"

  scale:
    start: 1.3
    end: 0.25
    easing: "OutQuad"

  rotation:
    start: -0.8
    end: 0.8
    easing: "Linear"

  color:
    start_r: 1.0
    start_g: 0.95
    start_b: 0.7
    end_r: 1.0
    end_g: 0.35
    end_b: 0.05
    easing: "Linear"

spawn:
  interval: 1
  particles_per_spawn: 18
  max_particles: 180
  is_loop: false
  life_time: 20
